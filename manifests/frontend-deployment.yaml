apiVersion: apps/v1
kind: Deployment
metadata:
  name: voting-frontend
  namespace: voting-app
  labels:
    app: voting-app
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: voting-app
      tier: frontend
  template:
    metadata:
      labels:
        app: voting-app
        tier: frontend
    spec:
      containers:
      - name: voting-frontend
        image: pooji09/voting-frontend:latest
        imagePullPolicy: Always
        env:
          - name: REACT_APP_APIHOSTPORT
            value: http://voting-api-service
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /ok
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /ok
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
